<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<link rel="stylesheet" href="../shared/theme.css">
<script>(function(){var t;try{t=new URLSearchParams(window.location.search).get("t")}catch(e){}if(!t){try{t=localStorage.getItem("portal-theme")}catch(e){}}if(!t){try{t=sessionStorage.getItem("portal-theme")}catch(e){}}if(t==="light")document.documentElement.classList.add("light-mode");else document.documentElement.classList.remove("light-mode");})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח אירועים — פורטל עובדים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070c18; --bg2:#0d1629; --bg3:#111d35; --bg4:#162040;
  --border:#1e3358; --accent:#00c2e0; --accent2:#7c3aed;
  --text1:#e2eaf8; --text2:#8fa3c8; --text3:#4a6080;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444;
  --sidebar:230px; --topbar:60px; --radius:12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text1); direction:rtl; }
.layout { display:grid; grid-template-columns:var(--sidebar) 1fr; grid-template-rows:var(--topbar) 1fr; min-height:100vh; }
.topbar { grid-column:1/-1; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; padding:0 24px; position:sticky; top:0; z-index:100; }
.topbar-logo { display:flex; align-items:center; gap:10px; width:var(--sidebar); flex-shrink:0; }
.logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:8px; display:grid; place-items:center; font-size:16px; }
.logo-text { font-size:13px; font-weight:700; }
.logo-sub { font-size:10px; color:var(--text2); }
.topbar-search { flex:1; max-width:380px; position:relative; }
.topbar-search input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:8px 14px 8px 38px; color:var(--text1); font-size:13.5px; font-family:inherit; direction:rtl; }
.topbar-search input:focus { outline:none; border-color:var(--accent); }
.topbar-search input::placeholder { color:var(--text3); }
.topbar-search .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
.topbar-actions { margin-right:auto; display:flex; align-items:center; gap:10px; }
.topbar-icon-btn { width:36px; height:36px; border-radius:8px; background:var(--bg3); border:1px solid var(--border); color:var(--text2); cursor:pointer; display:grid; place-items:center; position:relative; }
.badge { position:absolute; top:-4px; right:-4px; width:16px; height:16px; background:var(--danger); border-radius:50%; font-size:9px; font-weight:700; display:grid; place-items:center; color:#fff; }
.topbar-user { display:flex; align-items:center; gap:8px; padding:4px 8px; border-radius:8px; cursor:pointer; }
.user-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:grid; place-items:center; font-size:13px; font-weight:700; color:#fff; }
.sidebar { background:var(--bg2); border-left:1px solid var(--border); padding:16px 0; position:sticky; top:var(--topbar); height:calc(100vh - var(--topbar)); overflow-y:auto; }
.sidebar-section { padding:0 12px; margin-bottom:6px; }
.sidebar-label { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1px; padding:8px 6px 4px; }
.sidebar-link { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; text-decoration:none; color:var(--text2); font-size:13.5px; font-weight:500; transition:all 0.15s; }
.sidebar-link:hover { background:var(--bg3); color:var(--text1); }
.sidebar-link.active { background:rgba(0,194,224,0.12); color:var(--accent); }
.sidebar-link .icon { font-size:15px; width:20px; text-align:center; }
.sidebar-divider { height:1px; background:var(--border); margin:8px 12px; }
.main { padding:24px; overflow-y:auto; }

/* HEADER */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.page-title h1 { font-size:22px; font-weight:800; }
.page-title p { font-size:13px; color:var(--text2); margin-top:3px; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:8px; font-size:13.5px; font-weight:600; cursor:pointer; font-family:inherit; border:none; transition:all 0.2s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-ghost { background:transparent; border:1.5px solid var(--border); color:var(--text2); }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

/* LEGEND */
.legend { display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* MAIN LAYOUT */
.events-layout { display:grid; grid-template-columns:1fr 320px; gap:20px; }

/* CALENDAR */
.calendar-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px;
}
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.cal-title { font-size:18px; font-weight:800; }
.cal-nav { display:flex; gap:6px; }
.cal-nav-btn { width:32px; height:32px; border-radius:7px; background:var(--bg3); border:1px solid var(--border); color:var(--text2); cursor:pointer; display:grid; place-items:center; font-size:14px; transition:all 0.2s; }
.cal-nav-btn:hover { border-color:var(--accent); color:var(--accent); }

.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-dow { text-align:center; font-size:11px; font-weight:700; color:var(--text3); padding:6px 0; text-transform:uppercase; }
.cal-cell {
  min-height:64px; border-radius:8px; padding:6px;
  border:1px solid transparent; cursor:pointer;
  transition:all 0.15s; position:relative;
  background:var(--bg3);
}
.cal-cell:hover { border-color:var(--border); background:var(--bg4); }
.cal-cell.today { border-color:var(--accent); background:rgba(0,194,224,0.06); }
.cal-cell.other-month { opacity:0.35; }
.cal-cell.selected { border-color:var(--accent2); background:rgba(124,58,237,0.08); }
.cal-day-num { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:4px; }
.cal-cell.today .cal-day-num { color:var(--accent); }
.cal-event-dots { display:flex; flex-direction:column; gap:2px; }
.cal-event-dot {
  font-size:10px; padding:1px 4px; border-radius:3px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  font-weight:600; line-height:1.4;
}

/* SIDEBAR */
.events-sidebar { display:flex; flex-direction:column; gap:14px; }
.widget { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.widget-title { font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:14px; }

/* EVENT LIST */
.event-row {
  display:flex; gap:12px; padding:10px 0;
  border-bottom:1px solid var(--border); align-items:flex-start;
}
.event-row:last-child { border-bottom:none; }
.event-left-bar { width:3px; border-radius:2px; align-self:stretch; flex-shrink:0; }
.event-body { flex:1; }
.event-title { font-size:13.5px; font-weight:600; color:var(--text1); }
.event-time { font-size:11.5px; color:var(--text2); margin-top:2px; }
.event-loc { font-size:11px; color:var(--text3); }
.event-type-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; margin-top:4px; display:inline-block; }

/* DETAIL POPUP */
.event-detail {
  background:var(--bg3); border:1px solid var(--accent);
  border-radius:10px; padding:14px 16px; margin-top:12px;
  display:none;
}
.event-detail.show { display:block; animation:fadeIn 0.2s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:1100px) { .events-layout { grid-template-columns:1fr; } }
@media(max-width:768px) { .layout { grid-template-columns:1fr; } .sidebar { display:none; } }
</style>
</head>
<body>
<div class="layout">
  <header class="topbar">
    <div class="topbar-logo">
      <div class="logo-icon">🏛️</div>
      <div><div class="logo-text">פורטל עובדים</div><div class="logo-sub">משרד החדשנות, המדע והטכנולוגיה</div></div>
    </div>
    <div class="topbar-search"><span class="search-icon">🔍</span><input type="text" placeholder="חיפוש..."></div>
        <div id="option-switcher-mount"></div>
      <div class="topbar-actions">
      <div id="discover-mount"></div>
      <div id="theme-toggle-mount"></div>
      <div id="walkme-trigger-mount"></div>
      <div class="topbar-icon-btn">🔔<span class="badge">7</span></div>
      <div class="topbar-user">
        <div class="user-avatar" id="user-av"></div>
        <div><div style="font-size:13px;font-weight:600" id="user-nm"></div></div>
      </div>
    </div>
  </header>
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">ניווט ראשי</div>
      <a class="sidebar-link" href="index.html"><span class="icon">🏠</span> דף הבית</a>
      <a class="sidebar-link" href="announcements.html"><span class="icon">📣</span> עדכונים</a>
      <a class="sidebar-link active" href="events.html"><span class="icon">📅</span> אירועים</a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">שירותים</div>
      <a class="sidebar-link" href="info.html"><span class="icon">📚</span> מאגר מידע</a>
      <a class="sidebar-link" href="contacts.html"><span class="icon">👤</span> ספר טלפונים</a>
      <a class="sidebar-link" href="report.html"><span class="icon">📝</span> דיווח ובקשות</a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">מערכות</div>
      <a class="sidebar-link" href="#"><span class="icon">⏱️</span> מרכב"ה</a>
      <a class="sidebar-link" href="#"><span class="icon">🎫</span> TopDesk</a>
    </div>
  </nav>
  <main class="main">
    <div class="page-header">
      <div class="page-title"><h1>📅 לוח אירועים</h1><p>ישיבות, הדרכות, אירועים וחגים</p></div>
      <button class="btn btn-primary">+ אירוע חדש</button>
    </div>

    <div class="legend" id="legend"></div>

    <div class="events-layout">
      <!-- CALENDAR -->
      <div class="calendar-card">
        <div class="cal-header">
          <div class="cal-title" id="cal-title"></div>
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">›</button>
            <button class="cal-nav-btn" onclick="changeMonth(1)">‹</button>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="event-detail" id="event-detail"></div>
      </div>

      <!-- SIDEBAR -->
      <div class="events-sidebar">
        <div class="widget">
          <div class="widget-title">📌 אירועים קרובים</div>
          <div id="upcoming-list"></div>
        </div>
        <div class="widget">
          <div class="widget-title">🎄 חגים וחופשות</div>

<script src="../shared/theme.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/walkme.js"></script>
<script>
const d = PortalData;
document.getElementById('user-av').textContent = d.user.firstName[0];
document.getElementById('user-nm').textContent = d.user.name;

const typeConfig = {
  meeting:  { color:'#0ea5e9', label:'ישיבה', bg:'rgba(14,165,233,0.15)' },
  training: { color:'#10b981', label:'הדרכה', bg:'rgba(16,185,129,0.15)' },
  event:    { color:'#7c3aed', label:'אירוע', bg:'rgba(124,58,237,0.15)' },
  deadline: { color:'#ef4444', label:'מועד אחרון', bg:'rgba(239,68,68,0.15)' },
  holiday:  { color:'#f59e0b', label:'חג/חופשה', bg:'rgba(245,158,11,0.15)' }
};

// Legend
const legEl = document.getElementById('legend');
Object.entries(typeConfig).forEach(([k,v]) => {
  legEl.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${v.color}"></div>${v.label}</div>`;
});

let currentYear = 2026, currentMonth = 2; // 0-indexed, March
const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function getEventsForDate(y, m, day) {
  const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  return d.events.filter(e => e.date === dateStr);
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = `${months[currentMonth]} ${currentYear}`;
  const grid = document.getElementById('cal-grid');

  // Day of week headers (Sun-Sat, Hebrew style)
  const dows = ['א','ב','ג','ד','ה','ו','ש'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // Previous month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="cal-cell other-month"><div class="cal-day-num">${prevDays - i}</div></div>`;
  }

  // Current month days
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const evs = getEventsForDate(currentYear, currentMonth, day);
    const isToday = dateStr === todayStr;

    let dots = evs.slice(0,3).map(e => {
      const tc = typeConfig[e.type] || typeConfig.event;
      return `<div class="cal-event-dot" style="background:${tc.bg};color:${tc.color}">${e.title}</div>`;
    }).join('');
    if (evs.length > 3) dots += `<div style="font-size:10px;color:var(--text3)">+${evs.length-3} עוד</div>`;

    html += `<div class="cal-cell${isToday?' today':''}" onclick="showDayDetail('${dateStr}', ${day})">
      <div class="cal-day-num">${day}</div>
      <div class="cal-event-dots">${dots}</div>
    </div>`;
  }

  // Fill remaining
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  for (let i = 1; i <= totalCells - firstDay - daysInMonth; i++) {
    html += `<div class="cal-cell other-month"><div class="cal-day-num">${i}</div></div>`;
  }

  grid.innerHTML = html;
}

function showDayDetail(dateStr, day) {
  const evs = d.events.filter(e => e.date === dateStr);
  const detail = document.getElementById('event-detail');
  if (!evs.length) { detail.className='event-detail'; return; }
  detail.className = 'event-detail show';
  const dt = new Date(dateStr);
  detail.innerHTML = `<div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--accent)">${day} ${months[dt.getMonth()]} — ${evs.length} אירועים</div>` +
    evs.map(e => {
      const tc = typeConfig[e.type] || typeConfig.event;
      return `<div style="display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="width:3px;background:${tc.color};border-radius:2px;align-self:stretch"></div>
        <div>
          <div style="font-size:13px;font-weight:600">${e.title}</div>
          <div style="font-size:11px;color:var(--text2)">${e.time ? e.time+' | ' : ''}${e.location||''}</div>
        </div>
        <span style="margin-right:auto;font-size:10px;background:${tc.bg};color:${tc.color};padding:2px 8px;border-radius:10px;font-weight:700">${tc.label}</span>
      </div>`;
    }).join('');
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  document.getElementById('event-detail').className = 'event-detail';
  renderCalendar();
}

// Upcoming events
const upcoming = [...d.events]
  .filter(e => new Date(e.date) >= new Date())
  .sort((a,b) => new Date(a.date) - new Date(b.date));

const upEl = document.getElementById('upcoming-list');
upcoming.slice(0,4).forEach(e => {
  const tc = typeConfig[e.type] || typeConfig.event;
  const dt = new Date(e.date);
  upEl.innerHTML += `<div class="event-row">
    <div class="event-left-bar" style="background:${tc.color}"></div>
    <div class="event-body">
      <div class="event-title">${e.title}</div>
      <div class="event-time">${dt.toLocaleDateString('he-IL')}${e.time ? ' · ' + e.time : ''}</div>
      ${e.location ? `<div class="event-loc">📍 ${e.location}</div>` : ''}
      <span class="event-type-badge" style="background:${tc.bg};color:${tc.color}">${tc.label}</span>
    </div>
  </div>`;
});

// Holidays
const holidays = d.events.filter(e => e.type === 'holiday');
const holEl = document.getElementById('holidays-list');
if (holidays.length === 0) {
  holEl.innerHTML = '<div style="font-size:13px;color:var(--text3)">אין חגים ב-2 החודשים הבאים</div>';
}
holidays.forEach(e => {
  const dt = new Date(e.date);
  holEl.innerHTML += `<div class="event-row">
    <div class="event-left-bar" style="background:#f59e0b"></div>
    <div class="event-body">
      <div class="event-title">${e.title}</div>
      <div class="event-time">${dt.toLocaleDateString('he-IL')}</div>
    </div>
  </div>`;
});

renderCalendar();

// WalkMe
const walkme = new WalkMe([
  { target: '#legend',         title: 'מקרא אירועים',   text: 'כל סוג אירוע מסומן בצבע — ישיבה, הדרכה, אירוע, מועד אחרון וחג/חופשה.', speech: 'שימו לב למקרא הצבעים. כל סוג אירוע בצבע שלו, ישיבות, הדרכות, מועדים אחרונים וחגים. ככה קל לזהות במבט מה מחכה לכם.' },
  { target: '.calendar-card',  title: 'לוח שנה',         text: 'לחצו על תאריך שיש בו אירועים לראות את הפרטים. נווטו בין חודשים עם החצים.', speech: 'בלוח השנה אפשר לראות את כל האירועים לפי תאריך. ימים שיש בהם אירועים בולטים. לחצו על תאריך ותראו מה קורה בו.' },
  { target: '.events-sidebar', title: 'אירועים קרובים', text: 'כאן מופיעים האירועים הבאים וחגים וחופשות.', speech: 'בצד מוצגים האירועים הקרובים לפי סדר. ככה לא צריך לחפש בלוח השנה, הרלוונטי ביותר כבר מחכה פה.' }
], { accent:'#00c2e0', bg:'#0d1629', border:'#1e3358', textPrimary:'#e2eaf8', textSecondary:'#8fa3c8' });
document.getElementById('walkme-trigger-mount').appendChild(WalkMe.createTriggerButton('🎯 סיור'));
</script>
<script src="../shared/switcher.js"></script>
<script src="../shared/discover.js"></script>
<script src='../shared/agent.js'></script>
</body>
